<?xml version="1.0" encoding="UTF-8"?>
<!--
  VideoSensei Logo — Primary Mark (dark variant)
  Neon green brush-stroke "S" with play triangle negative space, on near-black background.
  Extracted from THEME.md design tokens.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: very subtle near-black to slightly elevated -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#15151A"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </radialGradient>

    <!-- Brush stroke gradient: neon green with slight depth -->
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5FFFB0"/>
      <stop offset="50%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00CC6A"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Brush texture filter (subtle irregularity) -->
    <filter id="brushTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (terminal aesthetic) -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.03">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Brush stroke "S" — two curves meeting in the middle, with play triangle cut out -->
  <g filter="url(#glow)">
    <!-- Top curve of S (going right then down) -->
    <path d="M 180 140
             Q 320 120 340 200
             Q 350 250 280 256
             Q 200 262 200 310
             Q 200 380 340 360
             Q 360 356 365 340"
          fill="none"
          stroke="url(#brushGrad)"
          stroke-width="44"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Brush stroke endpoints — slightly tapered -->
    <circle cx="180" cy="140" r="22" fill="url(#brushGrad)"/>
    <circle cx="365" cy="340" r="22" fill="url(#brushGrad)"/>
  </g>

  <!-- Play triangle in the negative space (center of S) -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <polygon points="-18,-22 22,0 -18,22"
             fill="#00FF88"
             opacity="0.95"/>
  </g>

  <!-- Brand wordmark — bottom -->
  <g font-family="'Cabinet Grotesk', 'Inter', system-ui, sans-serif"
     font-weight="800"
     font-size="44"
     letter-spacing="2"
     text-anchor="middle">
    <text x="256" y="455" fill="#FFFFFF">VIDEOSENSEI</text>
  </g>

  <!-- Tiny accent dot (period after the name = "done.") -->
  <circle cx="395" cy="445" r="5" fill="#00FF88" filter="url(#glow)"/>
</svg>
