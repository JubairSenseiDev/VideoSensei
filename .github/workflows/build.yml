name: VideoSensei CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run dart analyze
        working-directory: videosensei
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: videosensei
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: videosensei/coverage/lcov.info
          fail_ci_if_error: false

  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Build APK (arm64-v8a)
        working-directory: videosensei
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-android-arm64
          path: videosensei/build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: videosensei/build/app/outputs/flutter-apk/app-release.apk
          asset_name: VideoSensei-${{ github.event.release.tag_name }}-android-arm64.apk
          tag: ${{ github.ref }}

  # ── Linux .deb ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Build Linux release
        working-directory: videosensei
        run: flutter build linux --release

      - name: Package as tar.gz
        run: |
          cd videosensei/build/linux/x64/release/bundle
          tar -czf /tmp/VideoSensei-linux-x64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-linux-x64
          path: /tmp/VideoSensei-linux-x64.tar.gz

      - name: Attach to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/VideoSensei-linux-x64.tar.gz
          asset_name: VideoSensei-${{ github.event.release.tag_name }}-linux-x64.tar.gz
          tag: ${{ github.ref }}

  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Build Windows release
        working-directory: videosensei
        run: flutter build windows --release

      - name: Zip release
        run: |
          Compress-Archive -Path "videosensei\build\windows\x64\runner\Release\*" `
            -DestinationPath "VideoSensei-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-windows-x64
          path: VideoSensei-windows-x64.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: VideoSensei-windows-x64.zip
          asset_name: VideoSensei-${{ github.event.release.tag_name }}-windows-x64.zip
          tag: ${{ github.ref }}
