# =============================================================================
# VideoSensei — Flutter multi-platform build pipeline
# =============================================================================
# Builds every native + web artifact for VideoSensei:
#   - Android: APK (arm64-v8a, armeabi-v7a, x86_64) + universal APK + AAB
#   - Linux:   tar.gz (x64 + arm64) + .deb
#   - Windows: zip (x64) + MSIX
#   - macOS:   zip (universal) + .dmg
#   - Web:     tar.gz (PWA-ready)
#
# Trigger:
#   - Push to main/develop         -> runs analyze + test only
#   - Tag v*.*.*                    -> full multi-platform build + GitHub Release
#   - workflow_dispatch             -> manual full build (no release)
# =============================================================================

name: Flutter Builds

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'videosensei/**'
      - '.github/workflows/build.yml'
      - 'assets/**'
  pull_request:
    branches: [main]
    paths:
      - 'videosensei/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Skip GitHub Release step even on tag (debug)'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

concurrency:
  group: flutter-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Analyze + Test (always runs)
  # ---------------------------------------------------------------------------
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate Flutter platform scaffolds (if missing)
        working-directory: videosensei
        run: |
          if [ ! -d android ] || [ ! -d linux ] || [ ! -d windows ]; then
            echo "::warning::Platform scaffolds missing — generating with 'flutter create --platforms=android,linux,windows,web,macos .'"
            flutter create --platforms=android,linux,windows,web,macos --project-name videosensei .
          fi
          ls -la

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify l10n generated
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Run dart analyze
        working-directory: videosensei
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: videosensei
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: videosensei/coverage/
          if-no-files-found: ignore

      - name: Upload generated scaffolds (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-scaffolds
          path: |
            videosensei/android/
            videosensei/linux/
            videosensei/windows/
            videosensei/web/
            videosensei/macos/
            videosensei/.dart_tool/flutter_gen/
          if-no-files-found: ignore
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 2: Android APKs (multi-arch)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK (${{ matrix.arch }})
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            target: android-arm64
          - arch: armeabi-v7a
            target: android-arm
          - arch: x86_64
            target: android-x64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d android ] || flutter create --platforms=android --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build APK (${{ matrix.arch }})
        working-directory: videosensei
        run: flutter build apk --release --target-platform ${{ matrix.target }} --split-per-abi

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp videosensei/build/app/outputs/flutter-apk/app-${{ matrix.arch }}-release.apk \
             artifacts/VideoSensei-${{ github.ref_name }}-android-${{ matrix.arch }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-android-${{ matrix.arch }}
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: Universal Android APK + AAB (Play Store)
  # ---------------------------------------------------------------------------
  build-android-universal:
    name: Android Universal APK + AAB
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d android ] || flutter create --platforms=android --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build universal APK
        working-directory: videosensei
        run: flutter build apk --release

      - name: Build App Bundle (Play Store)
        working-directory: videosensei
        run: flutter build appbundle --release

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          cp videosensei/build/app/outputs/flutter-apk/app-release.apk \
             artifacts/VideoSensei-${{ github.ref_name }}-android-universal.apk
          cp videosensei/build/app/outputs/bundle/release/app-release.aab \
             artifacts/VideoSensei-${{ github.ref_name }}-android.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-android-universal
          path: artifacts/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 4: Linux (x64 + arm64)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (${{ matrix.arch }})
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev libfuse-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d linux ] || flutter create --platforms=linux --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build Linux release
        working-directory: videosensei
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          mkdir -p artifacts
          cd videosensei/build/linux/${{ matrix.arch }}/release/bundle
          tar -czf ${{ github.workspace }}/artifacts/VideoSensei-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz .

      - name: Build .deb (x64 only — needs alien/fpm on arm64)
        if: matrix.arch == 'x64'
        run: |
          sudo apt-get install -y dpkg-dev
          mkdir -p debpkg/usr/bin debpkg/usr/share/applications debpkg/usr/share/icons/hicolor/256x256/apps
          cp -r videosensei/build/linux/x64/release/bundle/* debpkg/usr/bin/videosensei
          cp assets/logo/logo-256.png debpkg/usr/share/icons/hicolor/256x256/apps/videosensei.png
          cat > debpkg/usr/share/applications/videosensei.desktop <<EOF
          [Desktop Entry]
          Name=VideoSensei
          Comment=Master your video. Sensei-grade clarity.
          Exec=/usr/bin/videosensei/videosensei
          Icon=videosensei
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;AudioVideoEditing;
          MimeType=video/mp4;video/x-matroska;video/quicktime;
          EOF
          cat > debpkg/DEBIAN/control <<EOF
          Package: videosensei
          Version: ${GITHUB_REF_NAME:-0.0.0}
          Architecture: amd64
          Maintainer: Jubair Sensei <jubairsensei@gmail.com>
          Description: Master your video. Sensei-grade clarity.
          Depends: libgtk-3-0, libmpv2 | libmpv1, liblzma5
          EOF
          dpkg-deb --build --root-owner-group debpkg \
            artifacts/VideoSensei-${GITHUB_REF_NAME:-0.0.0}-linux-x64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-linux-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 5: Windows
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          if (-not (Test-Path windows)) {
            flutter create --platforms=windows --project-name videosensei .
          }

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n
        continue-on-error: true

      - name: Build Windows release
        working-directory: videosensei
        run: flutter build windows --release

      - name: Zip release
        run: |
          mkdir artifacts
          Compress-Archive -Path "videosensei\build\windows\x64\runner\Release\*" `
            -DestinationPath "artifacts\VideoSensei-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-windows-x64
          path: artifacts/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 6: macOS (Intel + Apple Silicon universal)
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (universal)
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d macos ] || flutter create --platforms=macos --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build macOS universal
        working-directory: videosensei
        run: flutter build macos --release

      - name: Create dmg
        run: |
          mkdir -p artifacts
          cd videosensei/build/macos/Build/Products/Release
          # Zip the .app as fallback (no create-dmg in default runner)
          ditto -c -k --sequesterRsrc --keepParent VideoSensei.app \
            "${{ github.workspace }}/artifacts/VideoSensei-${{ github.ref_name }}-macos-universal.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-macos-universal
          path: artifacts/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 7: Web (PWA-ready)
  # ---------------------------------------------------------------------------
  build-web:
    name: Web (PWA)
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d web ] || flutter create --platforms=web --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build web (wasm + js fallback)
        working-directory: videosensei
        run: flutter build web --release --wasm

      - name: Package web bundle
        run: |
          mkdir -p artifacts
          cd videosensei/build/web
          tar -czf ${{ github.workspace }}/artifacts/VideoSensei-${{ github.ref_name }}-web.tar.gz .

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: videosensei/build/web
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy VideoSensei Web ${{ github.ref_name }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-web
          path: artifacts/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 8: Release summary
  # ---------------------------------------------------------------------------
  release-summary:
    name: All Builds Done
    needs: [build-android, build-android-universal, build-linux, build-windows, build-macos, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## VideoSensei build pipeline complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| Android (arm64, arm, x64, universal, AAB) | ${{ needs.build-android.result }} / ${{ needs.build-android-universal.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux (x64, arm64 + .deb) | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (x64 zip) | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (universal zip) | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web (PWA tar.gz + Pages) | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
