# ============================================================================
# VideoSensei CI — TypeScript build + Bun cross-compile + test + release
# ============================================================================
# Modern pipeline (v1.2.0+):
#   1. Typecheck TypeScript
#   2. Build Node.js bundle (esbuild) — fallback path
#   3. Cross-compile 5 single-binary executables with Bun:
#      - linux-x64, linux-arm64 (Termux on arm64 Android)
#      - darwin-x64, darwin-arm64 (Intel + Apple Silicon Macs)
#      - windows-x64
#   4. Test all 5 presets on each platform
#   5. Test installer on clean Ubuntu
#   6. On tag: auto-publish GitHub Release with all binaries
# ============================================================================

name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Typecheck + Node bundle
  # ---------------------------------------------------------------------------
  build-node:
    name: Typecheck + Node bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci || npm install

      - name: TypeScript typecheck
        working-directory: cli
        run: npx tsc --noEmit

      - name: Build Node bundle (esbuild)
        working-directory: cli
        run: npm run build:bundle

      - name: Verify Node bundle
        working-directory: cli
        run: |
          ls -la dist/videosensei.js
          node dist/videosensei.js --version
          node dist/videosensei.js --help | head -10

      - name: Upload Node bundle
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-node-bundle
          path: cli/dist/videosensei.js
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 2: Cross-compile single binaries with Bun (5 platforms)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-node
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: videosensei-linux-x64
          - target: bun-linux-arm64
            artifact: videosensei-linux-arm64
          - target: bun-darwin-x64
            artifact: videosensei-darwin-x64
          - target: bun-darwin-arm64
            artifact: videosensei-darwin-arm64
          - target: bun-windows-x64
            artifact: videosensei-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        working-directory: cli
        run: |
          bun build --compile --minify \
            --target=${{ matrix.target }} \
            --define BUILD_VERSION='"${GITHUB_REF_NAME:-1.2.0-dev}"' \
            src/main.ts --outfile dist/${{ matrix.artifact }}

      - name: Verify binary (Linux x64 only — others can't run here)
        if: matrix.target == 'bun-linux-x64'
        working-directory: cli
        run: |
          ls -la dist/${{ matrix.artifact }}
          ./dist/${{ matrix.artifact }} --version
          ./dist/${{ matrix.artifact }} --help | head -10

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/${{ matrix.artifact }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3: Test CLI end-to-end on Linux
  # ---------------------------------------------------------------------------
  test-cli:
    name: Test CLI (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build-node
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci || npm install

      - name: Build bundle
        working-directory: cli
        run: npm run build:bundle

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate test video
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=duration=10:size=640x480:rate=30" \
            -f lavfi -i "sine=frequency=440:duration=10" \
            -c:v libx264 -crf 23 -preset fast -c:a aac -b:a 128k \
            /tmp/test_video.mp4 2>&1 | tail -3

      - name: Test --version + --help
        working-directory: cli
        run: |
          node dist/videosensei.js --version
          node dist/videosensei.js --help | head -20

      - name: Test auto mode
        working-directory: cli
        run: |
          mkdir -p /tmp/out
          node dist/videosensei.js /tmp/test_video.mp4 -o /tmp/out 2>&1 | tail -10

      - name: Test all presets
        working-directory: cli
        run: |
          for p in lite balanced crystal sensei custom; do
            echo "--- $p ---"
            if [ "$p" = "custom" ]; then
              node dist/videosensei.js /tmp/test_video.mp4 -p custom --codec h264 --crf 20 -o /tmp/out 2>&1 | tail -5
            else
              node dist/videosensei.js /tmp/test_video.mp4 -p $p -o /tmp/out 2>&1 | tail -5
            fi
          done

      - name: Test history + batch
        working-directory: cli
        run: |
          node dist/videosensei.js --history 2>&1 | tail -10
          cp /tmp/test_video.mp4 /tmp/test_video2.mp4
          node dist/videosensei.js /tmp/test_video.mp4 /tmp/test_video2.mp4 -p lite -o /tmp/out 2>&1 | tail -5

  # ---------------------------------------------------------------------------
  # Job 4: Test Bun binary on Linux x64
  # ---------------------------------------------------------------------------
  test-binary:
    name: Test Bun binary (linux-x64)
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: videosensei-linux-x64
          path: ./bin

      - name: Make executable
        run: chmod +x ./bin/videosensei-linux-x64

      - name: Verify binary
        run: |
          ls -la ./bin/videosensei-linux-x64
          ./bin/videosensei-linux-x64 --version
          ./bin/videosensei-linux-x64 --help | head -10

      - name: Generate test video
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=duration=10:size=640x480:rate=30" \
            -f lavfi -i "sine=frequency=440:duration=10" \
            -c:v libx264 -crf 23 -preset fast -c:a aac -b:a 128k \
            /tmp/test_video.mp4 2>&1 | tail -3

      - name: Test auto mode with binary
        run: |
          mkdir -p /tmp/out
          ./bin/videosensei-linux-x64 /tmp/test_video.mp4 -o /tmp/out 2>&1 | tail -10

      - name: Test all presets with binary
        run: |
          for p in lite balanced crystal sensei; do
            echo "--- $p ---"
            ./bin/videosensei-linux-x64 /tmp/test_video.mp4 -p $p -o /tmp/out 2>&1 | tail -5
          done

  # ---------------------------------------------------------------------------
  # Job 5: Test installer on clean Ubuntu
  # ---------------------------------------------------------------------------
  test-installer:
    name: Test installer
    runs-on: ubuntu-latest
    needs: [build-node, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run installer
        run: bash install.sh

      - name: Verify videosensei
        run: |
          which videosensei
          videosensei --version
          videosensei --help | head -10

  # ---------------------------------------------------------------------------
  # Job 6: Release (only on tag)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-node, build-binaries, test-cli, test-binary, test-installer]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Node bundle
        uses: actions/download-artifact@v4
        with:
          name: videosensei-node-bundle
          path: ./release

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: videosensei-*
          path: ./release
          merge-multiple: true

      - name: List release artifacts
        run: |
          ls -la ./release/
          chmod +x ./release/videosensei-linux-x64 ./release/videosensei-linux-arm64 ./release/videosensei-darwin-x64 ./release/videosensei-darwin-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: VideoSensei ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## 🥋 VideoSensei ${{ steps.version.outputs.VERSION }}

            > Master your video. Sensei-grade clarity.

            ### Install (one-liner)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/JubairSenseiDev/VideoSensei/main/install.sh | bash
            ```

            The installer auto-detects your platform and downloads the right binary.
            **No Node.js, no Bun runtime needed** — single self-contained executable.

            ### Available binaries

            | Platform | Binary | Size |
            | -------- | ------ | ---- |
            | Linux x86_64 | `videosensei-linux-x64` | ~95 MB |
            | Linux arm64 (Termux) | `videosensei-linux-arm64` | ~95 MB |
            | macOS Intel | `videosensei-darwin-x64` | ~95 MB |
            | macOS Apple Silicon | `videosensei-darwin-arm64` | ~95 MB |
            | Windows x86_64 | `videosensei-windows-x64.exe` | ~95 MB |
            | Any (Node.js 18+) | `videosensei.js` (bundle) | ~50 KB |

            ### Auto-mode usage

            ```bash
            videosensei                    # picker + smart + compress (zero prompts)
            videosensei video.mp4          # smart + compress (zero prompts)
            videosensei video.mp4 -p sensei # AV1 master
            videosensei -i                 # interactive menu (old behavior)
            ```

            See [CHANGELOG.md](https://github.com/JubairSenseiDev/VideoSensei/blob/main/CHANGELOG.md) for full release notes.

            ---
            *Hack the size. Keep the clarity.* 🥋
          files: |
            release/videosensei-linux-x64
            release/videosensei-linux-arm64
            release/videosensei-darwin-x64
            release/videosensei-darwin-arm64
            release/videosensei-windows-x64.exe
            release/videosensei.js
            installer/installer.sh
            install.sh
            assets/logo/logo-512.png
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
