# ============================================================================
# VideoSensei CI — Lint + Test installer + Test CLI
# ============================================================================
# Runs on every push and PR to main.
# Verifies:
#   1. Bash scripts have valid syntax
#   2. Installer can install on a clean Ubuntu container
#   3. CLI works end-to-end (compresses a test video)
#   4. All 5 presets produce valid output
# ============================================================================

name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint bash scripts
  # ---------------------------------------------------------------------------
  lint:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck installer
        run: shellcheck -S warning installer/installer.sh || true
        # `|| true` because shellcheck is overly strict on some POSIX patterns
        # We treat errors as warnings for now

      - name: Bash syntax check (installer)
        run: bash -n installer/installer.sh && echo "✓ installer syntax OK"

      - name: Bash syntax check (extract-theme)
        run: bash -n scripts/extract-theme.sh && echo "✓ extract-theme syntax OK"

      - name: Node syntax check (CLI)
        run: node --check cli/videosensei.js && echo "✓ CLI syntax OK"

  # ---------------------------------------------------------------------------
  # Job 2: Test installer on Ubuntu
  # ---------------------------------------------------------------------------
  test-installer:
    name: Test installer (Ubuntu)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg codecs
        run: |
          echo "=== Checking required codecs ==="
          ffmpeg -codecs | grep -E 'libx264|libx265|libsvtav1' || {
            echo "Missing required codecs. Available codecs:"
            ffmpeg -codecs | head -30
            exit 1
          }

      - name: Run installer
        run: |
          echo "=== Running installer ==="
          bash installer/installer.sh <<< "y
          y"

      - name: Verify videosensei is on PATH
        run: |
          which videosensei
          videosensei --version
          videosensei --help | head -20

  # ---------------------------------------------------------------------------
  # Job 3: Test CLI end-to-end
  # ---------------------------------------------------------------------------
  test-cli:
    name: Test CLI end-to-end
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Make CLI executable
        run: chmod +x cli/videosensei.js

      - name: Test --version
        run: node cli/videosensei.js --version

      - name: Test --help
        run: node cli/videosensei.js --help | head -20

      - name: Generate test video
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=duration=10:size=640x480:rate=30" \
            -f lavfi -i "sine=frequency=440:duration=10" \
            -c:v libx264 -crf 23 -preset fast -c:a aac -b:a 128k \
            /tmp/test_video.mp4 2>&1 | tail -3
          ls -lh /tmp/test_video.mp4

      - name: Test Lite preset (H.264)
        run: |
          mkdir -p /tmp/out
          node cli/videosensei.js /tmp/test_video.mp4 -p lite -y -o /tmp/out 2>&1 | tail -10

      - name: Test Balanced preset (H.265)
        run: |
          node cli/videosensei.js /tmp/test_video.mp4 -p balanced -y -o /tmp/out 2>&1 | tail -10

      - name: Test Crystal preset (H.265 high quality)
        run: |
          node cli/videosensei.js /tmp/test_video.mp4 -p crystal -y -o /tmp/out 2>&1 | tail -10

      - name: Test Sensei preset (AV1)
        run: |
          node cli/videosensei.js /tmp/test_video.mp4 -p sensei -y -o /tmp/out 2>&1 | tail -10

      - name: Test Custom preset
        run: |
          node cli/videosensei.js /tmp/test_video.mp4 -p custom --codec h264 --crf 20 -y -o /tmp/out 2>&1 | tail -10

      - name: Test batch processing
        run: |
          cp /tmp/test_video.mp4 /tmp/test_video2.mp4
          node cli/videosensei.js /tmp/test_video.mp4 /tmp/test_video2.mp4 -p lite -y -o /tmp/out 2>&1 | tail -10

      - name: Test history
        run: node cli/videosensei.js --history 2>&1 | tail -20

      - name: Test smart mode
        run: node cli/videosensei.js /tmp/test_video.mp4 --smart -y -o /tmp/out 2>&1 | tail -10

      - name: Verify output files exist
        run: |
          echo "=== Output files ==="
          ls -lh /tmp/out/

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs-node-${{ matrix.node-version }}
          path: /tmp/out/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: Build release (only on tag)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test-installer, test-cli]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: VideoSensei ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## 🥋 VideoSensei ${{ steps.version.outputs.VERSION }}

            > Master your video. Sensei-grade clarity.

            ### Install

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/JubairSenseiDev/VideoSensei/main/installer/installer.sh)
            ```

            ### Quick start

            ```bash
            videosensei video.mp4 -p balanced     # ⚖️ daily default
            videosensei video.mp4 -p sensei       # 🥋 AV1 master (smallest)
            ```

            ### Changes in this release
            See [CHANGELOG](https://github.com/JubairSenseiDev/VideoSensei/blob/main/cli/README.md) for details.

            ---
            *Hack the size. Keep the clarity.* 🥋
          files: |
            cli/videosensei.js
            installer/installer.sh
            assets/logo/logo-512.png
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
