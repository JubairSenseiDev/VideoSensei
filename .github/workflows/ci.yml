# ============================================================================
# VideoSensei CI — TypeScript build + lint + test installer + test CLI
# ============================================================================
# Runs on every push and PR to main.
# Verifies:
#   1. TypeScript compiles cleanly (tsc --noEmit)
#   2. esbuild bundle succeeds
#   3. Bundled CLI works (all 5 presets, history, smart mode)
#   4. Installer works on clean Ubuntu
# ============================================================================

name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + Lint TypeScript
  # ---------------------------------------------------------------------------
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci || npm install

      - name: TypeScript typecheck
        working-directory: cli
        run: npx tsc --noEmit

      - name: Build bundle (esbuild)
        working-directory: cli
        run: npm run build

      - name: Verify bundle
        working-directory: cli
        run: |
          ls -la dist/videosensei.js
          node dist/videosensei.js --version
          node dist/videosensei.js --help | head -10

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-bundle
          path: cli/dist/videosensei.js
          if-no-files-found: error

      - name: Shellcheck installer
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -S warning installer/installer.sh || true
          bash -n installer/installer.sh && echo "✓ installer syntax OK"
          bash -n install.sh && echo "✓ install.sh syntax OK"

  # ---------------------------------------------------------------------------
  # Job 2: Test CLI end-to-end (all presets)
  # ---------------------------------------------------------------------------
  test-cli:
    name: Test CLI (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci || npm install

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg codecs
        run: |
          ffmpeg -codecs | grep -E 'libx264|libx265|libsvtav1' || {
            echo "Missing required codecs"
            exit 1
          }

      - name: Generate test video
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=duration=10:size=640x480:rate=30" \
            -f lavfi -i "sine=frequency=440:duration=10" \
            -c:v libx264 -crf 23 -preset fast -c:a aac -b:a 128k \
            /tmp/test_video.mp4 2>&1 | tail -3
          ls -lh /tmp/test_video.mp4

      - name: Test --version + --help
        working-directory: cli
        run: |
          node dist/videosensei.js --version
          node dist/videosensei.js --help | head -20

      - name: Test auto mode (smart pick, zero prompts)
        working-directory: cli
        run: |
          mkdir -p /tmp/out
          node dist/videosensei.js /tmp/test_video.mp4 -o /tmp/out 2>&1 | tail -10

      - name: Test Lite preset
        working-directory: cli
        run: node dist/videosensei.js /tmp/test_video.mp4 -p lite -o /tmp/out 2>&1 | tail -5

      - name: Test Balanced preset
        working-directory: cli
        run: node dist/videosensei.js /tmp/test_video.mp4 -p balanced -o /tmp/out 2>&1 | tail -5

      - name: Test Crystal preset
        working-directory: cli
        run: node dist/videosensei.js /tmp/test_video.mp4 -p crystal -o /tmp/out 2>&1 | tail -5

      - name: Test Sensei preset (AV1)
        working-directory: cli
        run: node dist/videosensei.js /tmp/test_video.mp4 -p sensei -o /tmp/out 2>&1 | tail -5

      - name: Test Custom preset
        working-directory: cli
        run: node dist/videosensei.js /tmp/test_video.mp4 -p custom --codec h264 --crf 20 -o /tmp/out 2>&1 | tail -5

      - name: Test history
        working-directory: cli
        run: node dist/videosensei.js --history 2>&1 | tail -10

      - name: Test batch
        working-directory: cli
        run: |
          cp /tmp/test_video.mp4 /tmp/test_video2.mp4
          node dist/videosensei.js /tmp/test_video.mp4 /tmp/test_video2.mp4 -p lite -o /tmp/out 2>&1 | tail -5

  # ---------------------------------------------------------------------------
  # Job 3: Test installer on clean Ubuntu
  # ---------------------------------------------------------------------------
  test-installer:
    name: Test installer
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run installer
        run: bash install.sh <<< "y
        y"

      - name: Verify videosensei is on PATH
        run: |
          which videosensei
          videosensei --version
          videosensei --help | head -10

  # ---------------------------------------------------------------------------
  # Job 4: Release (only on tag)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test-cli, test-installer]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: VideoSensei ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## 🥋 VideoSensei ${{ steps.version.outputs.VERSION }}

            > Master your video. Sensei-grade clarity.

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/JubairSenseiDev/VideoSensei/main/install.sh | bash
            ```

            ### Auto-mode usage (v1.1.0+)

            ```bash
            videosensei                    # picker + smart + compress (zero prompts)
            videosensei video.mp4          # smart + compress (zero prompts)
            videosensei video.mp4 -p sensei # AV1 master
            videosensei -i                 # interactive menu (old behavior)
            ```

            See [CHANGELOG.md](https://github.com/JubairSenseiDev/VideoSensei/blob/main/CHANGELOG.md) for full release notes.

            ---
            *Hack the size. Keep the clarity.* 🥋
          files: |
            cli/dist/videosensei.js
            installer/installer.sh
            install.sh
            assets/logo/logo-512.png
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
