# =============================================================================
# VideoSensei — Termux build pipeline
# =============================================================================
# Builds VideoSensei natively on Android (via Termux). Two flavors:
#
#   1. CLI linux-arm64 binary — runs *inside* Termux on the phone
#   2. Flutter APK (arm64-v8a) — built on phone, sideload-ready
#
# Trigger: workflow_dispatch (manual) — runs on a self-hosted Termux runner
# OR on ubuntu-arm64 (fall-back if no self-hosted Termux runner is registered).
#
# Termux runner setup:
#   pkg install git nodejs python ffmpeg
#   # Install Flutter manually:
#   git clone https://github.com/flutter/flutter.git ~/flutter
#   echo 'export PATH=$HOME/flutter/bin:$PATH' >> ~/.bashrc
#   # Install Bun (patches for Android via bd-loser/bun-termux):
#   curl -fsSL https://bun.sh/install | bash
#   # Register as self-hosted runner:
#   # https://docs.github.com/en/actions/hosting-your-own-runners/managing-self-hosted-runners-with-github-actions
# =============================================================================

name: Termux Build

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build Flutter APK (heavy, ~30 min on phone)'
        required: false
        default: 'true'
      build_cli:
        description: 'Build CLI linux-arm64 binary'
        required: false
        default: 'true'
      release:
        description: 'Attach artifacts to latest release'
        required: false
        default: 'false'
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  # ---------------------------------------------------------------------------
  # Detect runner type and pick the right path
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Environment
    runs-on: ${{ matrix.runner }}
    outputs:
      is_termux: ${{ steps.detect.outputs.is_termux }}
      arch: ${{ steps.detect.outputs.arch }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - self-hosted-termux
          - ubuntu-22.04-arm   # fallback if no Termux runner is online
    steps:
      - run: |
          if [ -d /data/data/com.termux ]; then
            echo "is_termux=true" >> $GITHUB_OUTPUT
            echo "Running natively on Termux (Android)"
          else
            echo "is_termux=false" >> $GITHUB_OUTPUT
            echo "Running on GitHub-hosted arm64 (fallback)"
          fi
          uname -m | tee /tmp/arch
          echo "arch=$(uname -m)" >> $GITHUB_OUTPUT
        id: detect

  # ---------------------------------------------------------------------------
  # Job: CLI linux-arm64 binary (Bun cross-compile)
  # Works on either Termux runner or ubuntu-arm64
  # ---------------------------------------------------------------------------
  cli-binary:
    name: CLI linux-arm64 binary
    needs: detect
    if: github.event.inputs.build_cli != 'false'
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build CLI binary (linux-arm64)
        working-directory: cli
        run: |
          bun build --compile --minify \
            --target=bun-linux-arm64 \
            --define BUILD_VERSION='"${GITHUB_REF_NAME:-1.2.0-dev}"' \
            src/main.ts --outfile dist/videosensei-linux-arm64

      - name: Verify binary
        working-directory: cli
        run: |
          chmod +x dist/videosensei-linux-arm64
          ls -la dist/videosensei-linux-arm64
          ./dist/videosensei-linux-arm64 --version || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-linux-arm64-termux
          path: cli/dist/videosensei-linux-arm64
          if-no-files-found: error

      - name: Attach to release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/videosensei-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job: Flutter APK (arm64-v8a) — built on ubuntu-arm64 fallback
  # ---------------------------------------------------------------------------
  flutter-apk:
    name: Flutter APK (arm64-v8a)
    needs: detect
    if: github.event.inputs.build_apk != 'false'
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform scaffolds
        working-directory: videosensei
        run: |
          [ -d android ] || flutter create --platforms=android --project-name videosensei .

      - name: Install dependencies
        working-directory: videosensei
        run: flutter pub get

      - name: Run Drift codegen
        working-directory: videosensei
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        working-directory: videosensei
        run: flutter gen-l10n || true

      - name: Build APK (arm64-v8a, optimized for Android phones)
        working-directory: videosensei
        run: flutter build apk --release --target-platform android-arm64

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp videosensei/build/app/outputs/flutter-apk/app-release.apk \
             artifacts/VideoSensei-${GITHUB_REF_NAME:-0.0.0}-android-arm64-termux.apk
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videosensei-android-arm64-termux
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach to release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job: Print Termux instructions (always — so the user has a copy-paste script
  # even if no Termux runner is registered)
  # ---------------------------------------------------------------------------
  termux-instructions:
    name: Termux Build Instructions
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Print phone-side build script
        run: |
          cat <<'EOF'
          ============================================================
          VideoSensei — Build on your phone via Termux
          ============================================================

          1) Install Termux from F-Droid (NOT Google Play — that one is outdated):
             https://f-droid.org/en/packages/com.termux/

          2) One-time setup (paste whole block into Termux):

             pkg update -y && pkg upgrade -y
             pkg install -y git nodejs python ffmpeg openjdk-17 cmake ninja clang \
                              libgtk3 libmpv jq zip tar

             # Flutter (manual install — Android needs the host SDK)
             git clone https://github.com/flutter/flutter.git ~/flutter
             echo 'export PATH=$HOME/flutter/bin:$PATH' >> ~/.bashrc
             source ~/.bashrc

             # Android SDK commandline tools
             pkg install -y android-tools
             mkdir -p ~/android-sdk/cmdline-tools
             cd ~/android-sdk/cmdline-tools
             wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
             unzip commandlinetools-linux-*.zip
             mv cmdline-tools latest
             yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager \
                "platform-tools" "platforms;android-34" "build-tools;34.0.0"
             echo 'export ANDROID_HOME=$HOME/android-sdk' >> ~/.bashrc
             source ~/.bashrc

             # Bun (for CLI build, patched for Android by bd-loser/bun-termux)
             curl -fsSL https://raw.githubusercontent.com/bd-loser/bun-termux/main/install.sh | bash

          3) Clone + build:

             git clone https://github.com/JubairSenseiDev/VideoSensei.git
             cd VideoSensei

             # ---- Build CLI binary ----
             cd cli
             bun install
             bun run build:bun:linux-arm64
             ./dist/videosensei-linux-arm64 --version

             # ---- Build Flutter APK ----
             cd ../videosensei
             flutter create --platforms=android --project-name videosensei .
             flutter pub get
             dart run build_runner build --delete-conflicting-outputs
             flutter build apk --release --target-platform android-arm64

             # APK output:
             ls -la build/app/outputs/flutter-apk/app-release.apk

          4) Install APK on phone:

             termux-open --chooser build/app/outputs/flutter-apk/app-release.apk
             # or copy to /sdcard:
             cp build/app/outputs/flutter-apk/app-release.apk /sdcard/Download/VideoSensei.apk
             # then open Files app → Download → tap to install

          EOF
