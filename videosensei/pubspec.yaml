name: videosensei
description: "Master your video. Sensei-grade clarity."
version: 0.2.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # FFmpeg — Android only (desktop uses bundled binary via Process)
  ffmpeg_kit_flutter_new: ^0.3.0

  # File picking
  file_picker: ^8.1.7

  # Storage
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.4

  # UI helpers
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.1

  # Utilities
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logo/

  fonts:
    - family: CabinetGrotesk
      fonts:
        - asset: assets/fonts/CabinetGrotesk-Regular.ttf
        - asset: assets/fonts/CabinetGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/CabinetGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/CabinetGrotesk-Extrabold.ttf
          weight: 800
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
